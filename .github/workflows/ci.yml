name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 26
      - run: npm test
      - run: npm run check:resources
      - run: npm run check:docs-truth
      - run: npm run check:no-live-egress
      - run: npm run check:public-safety-diff
      - run: node tools/smoke/dispatch-smoke.mjs
      - run: node tools/smoke/revision-effect-smoke.mjs
      - run: node tools/smoke/pi-e2e-load.mjs
      - run: git diff --check
