name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_matrix:
    name: test (${{ matrix.node-version }}, Pi ${{ matrix.pi-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.19.0
          - 26
        pi-version:
          - 0.80.7
          # renovate: datasource=npm depName=@earendil-works/pi-coding-agent versioning=semver
          - 0.80.10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install --ignore-scripts --no-save @earendil-works/pi-coding-agent@${{ matrix.pi-version }}
      # Ubuntu 24.04 restricts unprivileged user namespaces by default. The
      # runner is ephemeral, and Helix must exercise its real namespace sandbox:
      # https://discourse.ubuntu.com/t/ubuntu-24-04-lts-noble-numbat-release-notes/39890
      - name: Enable and prove the objective-gate namespace boundary
        run: |
          set -euo pipefail
          restriction_path=/proc/sys/kernel/apparmor_restrict_unprivileged_userns
          if [[ -e "$restriction_path" ]]; then
            echo 0 | sudo tee "$restriction_path" >/dev/null
          fi
          /usr/bin/unshare --user --map-root-user --mount --net --ipc --pid \
            --fork --kill-child=SIGKILL /usr/bin/true
      - run: npm test
      - run: npm run check:resources
      - run: npm run check:docs-truth
      - run: npm run check:no-live-egress
      - run: npm run check:public-safety-diff
      - run: npm run check:workflow-conformance
      - run: npm run check:provider-contracts
      - run: npm run check:package -- --pi-bin node_modules/.bin/pi
      - run: node tools/smoke/dispatch-smoke.mjs
      - run: node tools/smoke/revision-effect-smoke.mjs
      - run: node tools/smoke/pi-e2e-load.mjs --runtime-rpc --pi-bin node_modules/.bin/pi
      - run: bash tools/lockdown/no-egress-smoke.sh --active
      - run: git diff --check

  dependency_review:
    name: dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
      - name: Mark non-pull-request runs successful
        if: github.event_name != 'pull_request'
        run: echo 'dependency review applies to pull requests only'

  test:
    name: test
    if: ${{ always() }}
    needs: [test_matrix, dependency_review]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every blocking job
        env:
          MATRIX_RESULT: ${{ needs.test_matrix.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency_review.result }}
        run: |
          test "$MATRIX_RESULT" = success
          test "$DEPENDENCY_REVIEW_RESULT" = success
