name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.19.0
          - 26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm test
      - run: npm run check:resources
      - run: npm run check:docs-truth
      - run: npm run check:no-live-egress
      - run: npm run check:public-safety-diff
      - run: node tools/smoke/dispatch-smoke.mjs
      - run: node tools/smoke/revision-effect-smoke.mjs
      - run: node tools/smoke/pi-e2e-load.mjs
      - run: npm pack --dry-run
      - run: git diff --check
